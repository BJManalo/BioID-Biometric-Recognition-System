<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Thumb Scanner</title>
    <link rel="stylesheet" href="style.css">

    <!-- Google MediaPipe API for pinpointing exactly the thumb -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>

<body>

    <div class="container">
        <div class="glass-card">

            <div class="header">
                <h1>AI Thumb Scanner</h1>
                <p>Hold only your thumb up to the camera. The system will ignore all other fingers, faces, and objects.
                </p>
            </div>

            <!-- The AI Camera Container -->
            <div class="scanner-container" id="scanner">
                <video id="camera-feed" autoplay playsinline></video>
                <canvas id="overlay-canvas"></canvas>
                <div class="scan-line" id="scan-line"></div>
            </div>

            <div class="input-group">
                <label for="username">Driver Name</label>
                <input type="text" id="username" placeholder="e.g. John Doe">
            </div>

            <button class="btn" id="start-btn" disabled>
                Initializing AI Camera...
            </button>

            <div id="status-message" class="status-box"></div>

            <div class="registered-list" id="registered-list">
                <h3
                    style="font-size: 1rem; margin-bottom: 1rem; text-align: left; border-top: 1px solid var(--glass-border); padding-top: 1.5rem;">
                    Database Sandbox</h3>
                <div id="list-container">
                    <div style="color: var(--text-muted); font-size: 0.85rem; text-align: center;">No drivers registered
                        yet.</div>
                </div>
            </div>
        </div>
    </div>

    <!-- The Logic -->
    <script src="app.js"></script>
</body>

</html>
